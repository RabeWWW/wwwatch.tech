    },
    {
      id: makeId(),
      start: new Date("2008-09-15T00:00:00").toISOString(),
      end: "",
      title: "Lehman-Insolvenz",
      info: "Kernmoment der globalen Finanzkrise.",
      priority: 9,
      theme: "Wirtschaft",
      color: "#58d68d",
      source: "",
      link: "",
      tags: ["Finanzkrise","USA"]
    }
  ];

  /* ── Default Tabs ── */
  const MAIN_TAB = { id: "__main__", name: "Übersicht", isMain: true };

  /* ── State ── */
  const state = {
    tabs: [{ ...MAIN_TAB }],
    activeTabId: "__main__",
    tabAssignments: {},  /* { tabId: [eventId, ...] } */
    events: [],
    centerDateMs: Date.now(),
    zoomIndex: 2,
    activeThemes: new Set(["ALLE"]),
    editingId: null,
    infoPanelId: null,
    searchOpen: false,
    searchQuery: "",
    filterOpen: false,
    notesOpen: false,
    notes: [],
    editingNoteId: null,
    raf: null,
    flingRaf: null,
    gesture: null,
    ctxTabId: null
  };

  const els = {
    stage: document.getElementById("timelineStage"),
    canvas: document.getElementById("timelineCanvas"),
    rangeValue: document.getElementById("rangeValue"),
    zoomLabel: document.getElementById("zoomLabel"),
    priorityLabel: document.getElementById("priorityLabel"),
    eventCountLabel: document.getElementById("eventCountLabel"),
    filterBar: document.getElementById("filterBar"),

    rangeCard: document.getElementById("rangeCard"),
    rangeChevron: document.getElementById("rangeChevron"),
    rangeDetails: document.getElementById("rangeDetails"),
    topFilterBtn: document.getElementById("topFilterBtn"),
    topFilterPanel: document.getElementById("topFilterPanel"),
    topFilterList: document.getElementById("topFilterList"),

    fabAdd: document.getElementById("fabAdd"),
    searchBtn: document.getElementById("searchBtn"),
    zoomInBtn: document.getElementById("zoomInBtn"),
    zoomOutBtn: document.getElementById("zoomOutBtn"),

    searchInlay: document.getElementById("searchInlay"),
    searchInput: document.getElementById("searchInput"),
    searchResults: document.getElementById("searchResults"),
    searchCloseBtn: document.getElementById("searchCloseBtn"),

    copyBtn: document.getElementById("copyBtn"),
    importBtn: document.getElementById("importBtn"),
    todayBtn: document.getElementById("todayBtn"),
    toast: document.getElementById("toast"),

    eventModalBackdrop: document.getElementById("eventModalBackdrop"),
    eventModalTitle: document.getElementById("eventModalTitle"),
    eventStart: document.getElementById("eventStart"),
    eventEnd: document.getElementById("eventEnd"),
    eventTitle: document.getElementById("eventTitle"),
    eventInfo: document.getElementById("eventInfo"),
    eventPriority: document.getElementById("eventPriority"),
    eventTheme: document.getElementById("eventTheme"),
    eventColor: document.getElementById("eventColor"),
    eventSource: document.getElementById("eventSource"),
    eventLink: document.getElementById("eventLink"),
    eventTags: document.getElementById("eventTags"),
    saveEventBtn: document.getElementById("saveEventBtn"),
    deleteEventBtn: document.getElementById("deleteEventBtn"),
    closeEventBtn: document.getElementById("closeEventBtn"),

    importModalBackdrop: document.getElementById("importModalBackdrop"),
    importTextarea: document.getElementById("importTextarea"),
    applyImportBtn: document.getElementById("applyImportBtn"),
    closeImportBtn: document.getElementById("closeImportBtn"),

    filterBtn: document.getElementById("topFilterBtn"),
    filterInlay: document.getElementById("filterInlay"),
    filterList: document.getElementById("filterList"),

    notesBtn: document.getElementById("notesBtn"),
    notesInlay: document.getElementById("notesInlay"),
    notesList: document.getElementById("notesList"),
    notesCloseBtn: document.getElementById("notesCloseBtn"),
    noteAddBtn: document.getElementById("noteAddBtn"),

    workspaceSwitcher: document.getElementById("tabBarScroll"),
    wsIndicator: document.getElementById("tabIndicator"),
    tabBarWrap: document.getElementById("tabBarWrap"),
    tabBarScroll: document.getElementById("tabBarScroll"),
    tabAddBtn: document.getElementById("tabAddBtn"),
    tabCtxMenu: document.getElementById("tabCtxMenu"),
    tabCtxRename: document.getElementById("tabCtxRename"),
    tabCtxDelete: document.getElementById("tabCtxDelete"),
    addToTabBackdrop: document.getElementById("addToTabBackdrop"),
    addToTabList: document.getElementById("addToTabList"),
    addToTabClose: document.getElementById("addToTabClose"),
    addToTabBtn: document.getElementById("addToTabBtn"),
    renameBackdrop: document.getElementById("renameBackdrop"),
    renameInput: document.getElementById("renameInput"),
    renameSaveBtn: document.getElementById("renameSaveBtn"),
    renameCancelBtn: document.getElementById("renameCancelBtn"),

    infoPanelBackdrop: document.getElementById("infoPanelBackdrop"),
    infoPanelDate: document.getElementById("infoPanelDate"),
    infoPanelTitle: document.getElementById("infoPanelTitle"),
    infoPanelText: document.getElementById("infoPanelText"),
    infoPanelMeta: document.getElementById("infoPanelMeta"),
    infoPanelLink: document.getElementById("infoPanelLink"),
    infoPanelEditBtn: document.getElementById("infoPanelEditBtn"),
    infoPanelCloseBtn: document.getElementById("infoPanelCloseBtn")
  };

  /* ── Utilities ── */
  function makeId(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function clamp(v,min,max){
    return Math.max(min, Math.min(max, v));
  }

  function validDateISO(v){
    if(!v) return false;
    const t = new Date(v).getTime();
    return Number.isFinite(t);
  }

  function isColor(str){
    return typeof str === "string" && /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(str.trim());
  }

  function normalizeEvents(arr){
    return arr.map(item => ({
      id: item.id || makeId(),
      start: validDateISO(item.start) ? new Date(item.start).toISOString() : new Date().toISOString(),
      end: validDateISO(item.end) ? new Date(item.end).toISOString() : "",
      title: String(item.title || "Ohne Titel"),
      info: String(item.info || ""),
      priority: clamp(parseInt(item.priority,10) || 1, 1, 10),
      theme: String(item.theme || "Allgemein"),
      color: isColor(item.color) ? item.color : "#7aa2ff",
      source: String(item.source || ""),
      link: String(item.link || ""),
      tags: Array.isArray(item.tags)
        ? item.tags.map(String)
        : String(item.tags || "").split(",").map(s => s.trim()).filter(Boolean)
    }));
  }

  function sortEvents(){
    state.events.sort((a,b) => new Date(a.start) - new Date(b.start));
  }

  /* ── Tab / Workspace Storage ── */
  function wsEventsKey(wsId){
    return WS_EVENTS_PREFIX + (wsId === "__main__" ? "primary" : wsId);
  }

  function wsNotesKey(wsId){
    return WS_NOTES_PREFIX + (wsId === "__main__" ? "primary" : wsId);
  }

  function saveTabsMeta(){
    localStorage.setItem(WORKSPACES_META_KEY, JSON.stringify({
      tabs: state.tabs,
      activeTabId: state.activeTabId
    }));
  }

  function saveTabAssignments(){
    localStorage.setItem(TAB_ASSIGNMENTS_KEY, JSON.stringify(state.tabAssignments));
  }

  function loadTabAssignments(){
    try{
      const raw = localStorage.getItem(TAB_ASSIGNMENTS_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        state.tabAssignments = typeof parsed === "object" && parsed !== null ? parsed : {};
      } else {
        state.tabAssignments = {};
      }
    } catch { state.tabAssignments = {}; }
  }

  function saveEvents(){
    localStorage.setItem(wsEventsKey("__main__"), JSON.stringify(state.events));
    renderTabBar();
  }

  function loadEventsForWorkspace(wsId){
    try{
      const raw = localStorage.getItem(wsEventsKey(wsId));
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? normalizeEvents(parsed) : null;
    } catch {
      return null;
    }
  }

  function loadEvents(){
    const loaded = loadEventsForWorkspace("__main__");
    if(loaded){
      state.events = loaded;
    } else {
      state.events = [...SAMPLE_EVENTS];
      saveEvents();
    }
    sortEvents();
  }

  function saveNotes(){
    localStorage.setItem(wsNotesKey(state.activeTabId), JSON.stringify(state.notes));
  }

  function loadNotes(){
    try {
      const raw = localStorage.getItem(wsNotesKey(state.activeTabId));
      if(raw){
        const parsed = JSON.parse(raw);
        state.notes = Array.isArray(parsed) ? parsed : [];
      } else {
        state.notes = [];
      }
    } catch { state.notes = []; }
  }

  function getTabEventCount(tabId){
    if(tabId === "__main__"){
      try{
        const raw = localStorage.getItem(wsEventsKey("__main__"));
        if(!raw) return 0;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.length : 0;
      } catch { return 0; }
    }
    const ids = state.tabAssignments[tabId];
    return Array.isArray(ids) ? ids.length : 0;
  }

  /* Get events to display for current tab */
  function getActiveTabEvents(){
    if(state.activeTabId === "__main__") return state.events;
    const ids = state.tabAssignments[state.activeTabId];
    if(!Array.isArray(ids) || ids.length === 0) return [];
    const idSet = new Set(ids);
    return state.events.filter(e => idSet.has(e.id));
  }

  /* ── Legacy Migration ── */
  function migrateLegacyData(){
    const metaRaw = localStorage.getItem(WORKSPACES_META_KEY);
    if(metaRaw) return false;

    /* Migrate from old v1 workspace meta */
    const oldMeta = localStorage.getItem(LEGACY_META_KEY);
    const legacyEvents = localStorage.getItem(LEGACY_STORAGE_KEY);
    const legacyNotes = localStorage.getItem(LEGACY_NOTES_KEY);

    /* Migrate primary events */
    const primaryKey = WS_EVENTS_PREFIX + "primary";
    if(!localStorage.getItem(primaryKey) && legacyEvents){
      localStorage.setItem(primaryKey, legacyEvents);
    }

    /* Migrate primary notes */
    const primaryNotesKey = WS_NOTES_PREFIX + "primary";
    if(!localStorage.getItem(primaryNotesKey) && legacyNotes){
      localStorage.setItem(primaryNotesKey, legacyNotes);
    }

    /* If old v1 had secondary workspace events, create a user tab for them */
    const secondaryEvents = localStorage.getItem(WS_EVENTS_PREFIX + "secondary");
    if(secondaryEvents){
      try{
        const parsed = JSON.parse(secondaryEvents);
        if(Array.isArray(parsed) && parsed.length > 0){
          /* Merge secondary events into main pool and create a tab */
          const mainRaw = localStorage.getItem(primaryKey);
          const mainEvents = mainRaw ? JSON.parse(mainRaw) : [];
          const existingIds = new Set(mainEvents.map(e => e.id));
          const newEvents = parsed.filter(e => !existingIds.has(e.id));
          if(newEvents.length > 0){
            localStorage.setItem(primaryKey, JSON.stringify([...mainEvents, ...newEvents]));
          }
          /* Create "Extern" user tab with those event IDs */
          const externTabId = makeId();
          const allSecondaryIds = parsed.map(e => e.id);
          state.tabs.push({ id: externTabId, name: "Extern", isMain: false });
          state.tabAssignments[externTabId] = allSecondaryIds;
          saveTabAssignments();
        }
      } catch {}
    }

    return true;
  }

  function loadTabsMeta(){
    migrateLegacyData();

    try{
      const raw = localStorage.getItem(WORKSPACES_META_KEY);
      if(raw){
        const meta = JSON.parse(raw);
        if(Array.isArray(meta.tabs) && meta.tabs.length >= 1){
          /* Ensure main tab is always first */
          const mainIdx = meta.tabs.findIndex(t => t.id === "__main__");
          if(mainIdx === -1){
            meta.tabs.unshift({ ...MAIN_TAB });
          } else {
            meta.tabs[mainIdx] = { ...MAIN_TAB };
            if(mainIdx > 0){
              meta.tabs.splice(mainIdx, 1);
              meta.tabs.unshift({ ...MAIN_TAB });
            }
          }
          state.tabs = meta.tabs;
        }
        if(meta.activeTabId && state.tabs.some(t => t.id === meta.activeTabId)){
          state.activeTabId = meta.activeTabId;
        } else {
          state.activeTabId = "__main__";
        }
      }
    } catch {}

    saveTabsMeta();
  }

  /* ── Switch Tab ── */
  function switchTab(tabId){
    if(tabId === state.activeTabId) return;

    saveNotes();

    state.activeTabId = tabId;
    saveTabsMeta();

    loadNotes();

    /* Reset UI state */
    state.activeThemes = new Set(["ALLE"]);
    state.editingId = null;
    state.editingNoteId = null;
    closeSearch();
    closeFilter();
    closeNotes();
    closeEventModal();
    closeImportModal();
    closeTopFilterPanel();
    els.rangeCard.classList.remove("expanded");

    renderTabBar();
    renderFilterBar();
    updateFilterBtnStyle();
    requestRender();
    renderSearchResults();
  }

  /* ── Tab Bar Rendering ── */
  function renderTabBar(){
    const container = els.tabBarScroll;
    container.innerHTML = "";

    state.tabs.forEach(tab => {
      const btn = document.createElement("button");
      btn.className = "ws-tab" + (tab.id === state.activeTabId ? " active" : "") + (tab.isMain ? " main-tab" : "");
      btn.setAttribute("data-tab", tab.id);

      const nameSpan = document.createElement("span");
      nameSpan.textContent = tab.name;
      btn.appendChild(nameSpan);

      const countSpan = document.createElement("span");
      countSpan.className = "ws-count";
      countSpan.textContent = getTabEventCount(tab.id);
      btn.appendChild(countSpan);

      /* Long press for context menu on user tabs */
      if(!tab.isMain){
        let longPressTimer = null;
        btn.addEventListener("pointerdown", (e) => {
          longPressTimer = setTimeout(() => {
            longPressTimer = null;
            openTabContextMenu(tab.id, e);
          }, 500);
        });
        btn.addEventListener("pointerup", () => { if(longPressTimer) clearTimeout(longPressTimer); });
        btn.addEventListener("pointercancel", () => { if(longPressTimer) clearTimeout(longPressTimer); });
        btn.addEventListener("pointermove", () => { if(longPressTimer) clearTimeout(longPressTimer); });
        btn.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          openTabContextMenu(tab.id, e);
        });
      }

      btn.addEventListener("click", () => switchTab(tab.id));
      container.appendChild(btn);
    });

    /* Scroll active tab into view */
    const activeBtn = container.querySelector(".ws-tab.active");
    if(activeBtn){
      setTimeout(() => activeBtn.scrollIntoView({ behavior:"smooth", inline:"center", block:"nearest" }), 50);
    }
  }

  /* ── Tab CRUD ── */
  function createNewTab(){
    const id = makeId();
    const num = state.tabs.filter(t => !t.isMain).length + 1;
    const newTab = { id, name: "Sammlung " + num, isMain: false };
    state.tabs.push(newTab);
    state.tabAssignments[id] = [];
    saveTabsMeta();
    saveTabAssignments();
    switchTab(id);
    /* Open rename immediately */
    openRenameDialog(id);
  }

  function deleteTab(tabId){
    const tab = state.tabs.find(t => t.id === tabId);
    if(!tab || tab.isMain) return;

    if(!confirm("Tab \"" + tab.name + "\" wirklich löschen? Die Ereignisse bleiben in der Übersicht erhalten.")){
      return;
    }

    /* Remove tab */
    state.tabs = state.tabs.filter(t => t.id !== tabId);
    delete state.tabAssignments[tabId];

    /* Clean up notes storage for this tab */
    localStorage.removeItem(wsNotesKey(tabId));

    /* Switch to main if deleted tab was active */
    if(state.activeTabId === tabId){
      state.activeTabId = "__main__";
    }

    saveTabsMeta();
    saveTabAssignments();
    renderTabBar();
    if(state.activeTabId === "__main__"){
      loadNotes();
      requestRender();
    }
  }

  function renameTab(tabId, newName){
    const tab = state.tabs.find(t => t.id === tabId);
    if(!tab || tab.isMain) return;
    tab.name = newName.trim() || tab.name;
    saveTabsMeta();
    renderTabBar();
  }

  /* ── Tab Context Menu ── */
  function openTabContextMenu(tabId, e){
    state.ctxTabId = tabId;
    const menu = els.tabCtxMenu;
    const x = Math.min(e.clientX || e.pageX, window.innerWidth - 180);
    const y = Math.min(e.clientY || e.pageY, window.innerHeight - 100);
    menu.style.left = x + "px";
    menu.style.top = y + "px";
    menu.classList.add("open");
  }

  function closeTabContextMenu(){
    els.tabCtxMenu.classList.remove("open");
    state.ctxTabId = null;
  }

  /* ── Rename Dialog ── */
  function openRenameDialog(tabId){
    closeTabContextMenu();
    const tab = state.tabs.find(t => t.id === tabId);
    if(!tab || tab.isMain) return;
    state.ctxTabId = tabId;
    els.renameInput.value = tab.name;
    els.renameBackdrop.classList.add("open");
    setTimeout(() => { els.renameInput.focus(); els.renameInput.select(); }, 100);
  }

  function closeRenameDialog(){
    els.renameBackdrop.classList.remove("open");
  }

  function confirmRename(){
    if(state.ctxTabId){
      renameTab(state.ctxTabId, els.renameInput.value);
    }
    closeRenameDialog();
  }

  /* ── Add-to-Tab Sheet ── */
  function openAddToTabSheet(eventId){
    if(!eventId) return;
    state._addToTabEventId = eventId;
    const list = els.addToTabList;
    list.innerHTML = "";

    const userTabs = state.tabs.filter(t => !t.isMain);
    if(userTabs.length === 0){
      list.innerHTML = '<div class="addtotab-empty">Noch keine Sammlungen vorhanden.<br>Erstelle zuerst einen Tab mit dem + Button.</div>';
    } else {
      userTabs.forEach(tab => {
        const ids = state.tabAssignments[tab.id] || [];
        const alreadyIn = ids.includes(eventId);

        const opt = document.createElement("button");
        opt.className = "addtotab-option";
        opt.innerHTML = '<span>' + escapeHtml(tab.name) + '</span>' + (alreadyIn ? '<span class="check">&#10003;</span>' : '');
        if(!alreadyIn){
          opt.addEventListener("click", () => {
            addEventToTab(eventId, tab.id);
            openAddToTabSheet(eventId); /* refresh */
          });
        }
        list.appendChild(opt);
      });
    }

    els.addToTabBackdrop.classList.add("open");
  }

  function closeAddToTabSheet(){
    els.addToTabBackdrop.classList.remove("open");
    state._addToTabEventId = null;
  }

  function addEventToTab(eventId, tabId){
    if(!state.tabAssignments[tabId]){
      state.tabAssignments[tabId] = [];
    }
    if(!state.tabAssignments[tabId].includes(eventId)){
      state.tabAssignments[tabId].push(eventId);
      saveTabAssignments();
      renderTabBar();
      const tab = state.tabs.find(t => t.id === tabId);
      showToast("Hinzugefügt zu \"" + (tab ? tab.name : "Tab") + "\"");
    }
  }

  /* ── Zoom / Range ── */
  function getZoom(){
    return ZOOM_PRESETS[state.zoomIndex];
  }

  function daysVisible(){
    return getZoom().daysVisible;
  }

  function msPerPixel(){
    const h = els.canvas.clientHeight || 1;
    return (daysVisible() * MS_DAY) / h;
  }

  function visibleRange(){
    const half = (daysVisible() * MS_DAY) / 2;
    return {
      start: state.centerDateMs - half,
      end: state.centerDateMs + half
    };
  }

  function focusRange(){
    const r = visibleRange();
    const expand = (r.end - r.start) * 0.5;
    return {
      start: r.start - expand,
      end: r.end + expand
    };
  }

  function minPriorityForZoom(){
    // Legacy helper – now only used as fallback in density-based filtering
    const d = daysVisible();
    if (d <= 14) return 1;
    if (d <= 60) return 4;
    if (d <= 365 * 5) return 7;
    return 9;
  }

  function pxFromDate(dateMs){
    const delta = dateMs - state.centerDateMs;
    return els.canvas.clientHeight / 2 + (delta / msPerPixel());
  }

  /* ── Formatting ── */
  function formatDate(ms){
    const d = new Date(ms);
    const dd = String(d.getDate()).padStart(2,"0");
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const yyyy = d.getFullYear();
    return `${dd}.${mm}.${yyyy}`;
  }

  function formatMonthYear(ms){
    const d = new Date(ms);
    return `${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`;
  }

  function formatRange(startMs,endMs){
    const spanDays = (endMs - startMs) / MS_DAY;
    if(spanDays > 365 * 80) return `${new Date(startMs).getFullYear()} \u2013 ${new Date(endMs).getFullYear()}`;
    if(spanDays > 365 * 3) return `${formatMonthYear(startMs)} \u2013 ${formatMonthYear(endMs)}`;
    return `${formatDate(startMs)} \u2013 ${formatDate(endMs)}`;
  }

  function formatEventDate(ev){
    const s = new Date(ev.start).getTime();
    if(ev.end && validDateISO(ev.end)){
      const e = new Date(ev.end).getTime();
      return `${formatDate(s)} \u2013 ${formatDate(e)}`;
    }
    return formatDate(s);
  }

  function formatDateTimeISOForInput(dateStr){
    if(!validDateISO(dateStr)) return "";
    const d = new Date(dateStr);
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function showToast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove("show"), 1800);
  }

  /* ── Filter / Themes ── */
  function deriveThemes(){
    const extras = [...new Set(
      getActiveTabEvents().map(e => e.theme).filter(Boolean).map(s => s.trim())
    )];
    return ["ALLE", ...new Set([...THEMES_DEFAULT.filter(x => x !== "ALLE"), ...extras])];
  }

  function isThemeActive(theme){
    return state.activeThemes.has("ALLE") || state.activeThemes.has(theme);
  }

  function renderFilterBar(){
    const themes = deriveThemes();
    els.filterBar.innerHTML = "";
    themes.forEach(theme => {
      const btn = document.createElement("button");
      const active = theme === "ALLE" ? state.activeThemes.has("ALLE") : isThemeActive(theme);
      btn.className = "chip" + (active ? " active" : "");
      btn.textContent = theme;
      btn.addEventListener("click", () => {
        toggleThemeSelection(theme);
      });
      els.filterBar.appendChild(btn);
    });
  }

  /* ── Markers ── */
  function buildMarkers(){
    const zoom = getZoom().marker;
    const range = visibleRange();
    const markers = [];
    let cursor = new Date(range.start);

    if (zoom === "day"){
      cursor.setHours(0,0,0,0);
      while(cursor.getTime() <= range.end){
        markers.push({ ms: cursor.getTime(), label: formatDate(cursor.getTime()) });
        cursor.setDate(cursor.getDate()+1);
      }
    } else if (zoom === "week"){
      cursor.setHours(0,0,0,0);
      const day = cursor.getDay();
      const diff = (day + 6) % 7;
      cursor.setDate(cursor.getDate()-diff);
      while(cursor.getTime() <= range.end){
        const end = new Date(cursor.getTime() + 6*MS_DAY);
        markers.push({
          ms: cursor.getTime(),
          label: `${formatDate(cursor.getTime())} \u2013 ${formatDate(end.getTime())}`
        });
        cursor.setDate(cursor.getDate()+7);
      }
    } else if (zoom === "month"){
      cursor = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
      while(cursor.getTime() <= range.end){
        markers.push({
          ms: cursor.getTime(),
          label: `${String(cursor.getMonth()+1).padStart(2,"0")}.${cursor.getFullYear()}`
        });
        cursor.setMonth(cursor.getMonth()+1);
      }
    } else if (zoom === "year"){
      cursor = new Date(cursor.getFullYear(), 0, 1);
      while(cursor.getTime() <= range.end){
        markers.push({ ms: cursor.getTime(), label: `${cursor.getFullYear()}` });
        cursor.setFullYear(cursor.getFullYear()+1);
      }
    } else if (zoom === "decade"){
      cursor = new Date(Math.floor(cursor.getFullYear()/10)*10, 0, 1);
      while(cursor.getTime() <= range.end){
        markers.push({ ms: cursor.getTime(), label: `${cursor.getFullYear()}er` });
        cursor.setFullYear(cursor.getFullYear()+10);
      }
    } else {
      cursor = new Date(Math.floor(cursor.getFullYear()/100)*100, 0, 1);
      while(cursor.getTime() <= range.end){
        markers.push({ ms: cursor.getTime(), label: `${cursor.getFullYear()}\u2013${cursor.getFullYear()+99}` });
        cursor.setFullYear(cursor.getFullYear()+100);
      }
    }

    return markers;
  }

  /* ── Filtered Events ── */
  // Tracks the effective minimum priority used in the last render
  let _lastEffectiveMinPriority = 1;

  function filteredEvents(){
    const focus = focusRange();

    // Step 1: Get all events matching date range and theme (no priority filter)
    const candidates = getActiveTabEvents().filter(ev => {
      const startMs = new Date(ev.start).getTime();
      const endMs = ev.end && validDateISO(ev.end) ? new Date(ev.end).getTime() : startMs;
      const inRange = endMs >= focus.start && startMs <= focus.end;
      const themeOk = state.activeThemes.has("ALLE") || state.activeThemes.has(ev.theme);
      return inRange && themeOk;
    });

    // Step 2: Determine how many events can fit comfortably
    const canvasH = els.canvas.clientHeight || 600;
    const maxLanes = window.innerWidth >= 700 ? 2 : 1;
    const avgCardHeight = 150; // approximate height per card including spacing
    const maxComfortable = Math.max(4, Math.floor((canvasH / avgCardHeight) * maxLanes * 1.3));

    // Step 3: If events fit, show them all – no priority filtering
    if (candidates.length <= maxComfortable) {
      _lastEffectiveMinPriority = 1;
      return candidates;
    }

    // Step 4: Too many events – progressively raise minimum priority until they fit
    for (let minP = 2; minP <= 10; minP++) {
      const filtered = candidates.filter(ev => ev.priority >= minP);
      if (filtered.length <= maxComfortable) {
        _lastEffectiveMinPriority = minP;
        return filtered;
      }
    }

    // If even priority 10 is still too many, show all of priority 10
    _lastEffectiveMinPriority = 10;
    return candidates.filter(ev => ev.priority >= 10);
  }

  function updateHeader(count){
    const r = visibleRange();
    els.rangeValue.textContent = formatRange(r.start, r.end);
    els.zoomLabel.textContent = `Zoom: ${getZoom().name}`;
    if (_lastEffectiveMinPriority > 1) {
      els.priorityLabel.textContent = `Sichtbar: Priorität ${_lastEffectiveMinPriority}–10 (Platz begrenzt)`;
    } else {
      els.priorityLabel.textContent = `Alle Prioritäten sichtbar`;
    }
    els.eventCountLabel.textContent = `${count} sichtbare Ereignisse`;
  }

  /* ── Render ── */
  function render(){
    state.raf = null;
    const canvas = els.canvas;
    const h = canvas.clientHeight;

    canvas.querySelectorAll(".marker,.event-card,.empty").forEach(el => el.remove());

    const markers = buildMarkers();
    markers.forEach(m => {
      const y = pxFromDate(m.ms);
      if(y < -60 || y > h + 60) return;
      const el = document.createElement("div");
      el.className = "marker";
      el.style.top = `${y}px`;
      el.innerHTML = `<div class="tick"></div><div class="label">${escapeHtml(m.label)}</div>`;
      canvas.appendChild(el);
    });

    const events = filteredEvents();
    updateHeader(events.length);

    if(events.length === 0){
      const wsName = state.tabs.find(w => w.id === state.activeTabId)?.name || "";
      const empty = document.createElement("div");
      empty.className = "empty";
      if(state.activeTabId === "__main__"){
        empty.innerHTML = `Keine Ereignisse vorhanden.<br>Zoome, \u00e4ndere den Filter oder nutze die Suche.`;
      } else {
        empty.innerHTML = `Keine Ereignisse in \u201e${escapeHtml(wsName)}\u201c.<br>F\u00fcge Ereignisse \u00fcber die \u00dcbersicht hinzu.`;
      }
      canvas.appendChild(empty);
      return;
    }

    const laneEnds = [];
    const maxLanes = window.innerWidth >= 700 ? 2 : 1;
    const laneX = window.innerWidth >= 700 ? ["86px","430px"] : ["46px"];
    const cardWidth = window.innerWidth >= 700 ? "330px" : "auto";

    events.forEach(ev => {
      const startMs = new Date(ev.start).getTime();
      const endMs = ev.end && validDateISO(ev.end) ? new Date(ev.end).getTime() : startMs;
      const y = pxFromDate(startMs);
      const durationPx = Math.max(0, (endMs - startMs) / msPerPixel());
      const top = clamp(y - 50, 8, h - 120);

      let lane = 0;
      let placed = false;

      for(let i=0;i<maxLanes;i++){
        if((laneEnds[i] || -Infinity) < top - 8){
          lane = i;
          placed = true;
          break;
        }
      }

      if(!placed){
        let min = Infinity;
        for(let i=0;i<maxLanes;i++){
          const v = laneEnds[i] || 0;
          if(v < min){
            min = v;
            lane = i;
          }
        }
      }

      const card = document.createElement("div");
      card.className = "event-card";
      card.style.setProperty("--cardColor", ev.color || "#7aa2ff");
      card.style.top = `${top}px`;

      if(window.innerWidth >= 700){
        card.style.left = laneX[lane];
        card.style.width = cardWidth;
        card.style.right = "auto";
      }

      card.innerHTML = `
        <div class="priority">P${ev.priority}</div>
        <div class="event-date">${escapeHtml(formatEventDate(ev))}</div>
        <div class="event-title">${escapeHtml(ev.title || "Ohne Titel")}</div>
      `;

      if(durationPx > 18){
        const band = document.createElement("div");
        band.style.position = "absolute";
        band.style.left = "-18px";
        band.style.top = "50px";
        band.style.width = "6px";
        band.style.height = `${Math.min(durationPx, 220)}px`;
        band.style.borderRadius = "999px";
        band.style.background = `${ev.color}66`;
        band.style.boxShadow = `0 0 0 1px ${ev.color}22`;
        card.appendChild(band);
      }

      card.dataset.eventId = ev.id;
      canvas.appendChild(card);

      const approximateHeight = 68;
      laneEnds[lane] = top + approximateHeight;
    });
  }

  function requestRender(){
    if(state.raf) return;
    state.raf = requestAnimationFrame(render);
  }

  /* ── Fling / Gestures ── */
  function stopFling(){
    if(state.flingRaf){
      cancelAnimationFrame(state.flingRaf);
      state.flingRaf = null;
    }
  }

  function startFling(velocityPxPerMs){
    stopFling();
    let velocity = velocityPxPerMs;
    let last = performance.now();

    const step = (now) => {
      const dt = now - last;
      last = now;

      if(Math.abs(velocity) < 0.01){
        state.flingRaf = null;
        return;
      }

      state.centerDateMs -= velocity * dt * msPerPixel();
      velocity *= Math.pow(0.994, dt);

      requestRender();
      state.flingRaf = requestAnimationFrame(step);
    };

    state.flingRaf = requestAnimationFrame(step);
  }

  function zoomAroundCenter(direction){
    stopFling();
    state.zoomIndex = clamp(state.zoomIndex + direction, 0, ZOOM_PRESETS.length - 1);
    requestRender();
  }

  function attachGestures(){
    const stage = els.stage;
    const TAP_MOVE_THRESHOLD = 10;
    const TAP_TIME_THRESHOLD = 250;
    const LONG_PRESS_DELAY = 600;

    let longPressTimer = null;
    let longPressCard = null;

    function clearLongPress(){
      if(longPressTimer){ clearTimeout(longPressTimer); longPressTimer = null; }
      if(longPressCard){ longPressCard.classList.remove("longpress-active"); longPressCard = null; }
    }

    stage.addEventListener("touchstart", (e) => {
      if(e.target.closest(".fab-row")) return;
      if(e.target.closest(".zoom-stack")) return;
      if(state.searchOpen && e.target.closest(".search-inlay")) return;

      stopFling();
      clearLongPress();

      if(e.touches.length === 1){
        const t = e.touches[0];
        state.gesture = {
          type: "drag",
          lastY: t.clientY,
          startY: t.clientY,
          startX: t.clientX,
          startTime: performance.now(),
          velocity: 0,
          lastTime: performance.now(),
          moved: false,
          target: e.target,
          longPressed: false
        };

        /* Long press detection */
        const card = e.target.closest && e.target.closest(".event-card");
        if(card && card.dataset.eventId){
          longPressTimer = setTimeout(() => {
            if(state.gesture && !state.gesture.moved){
              state.gesture.longPressed = true;
              longPressCard = card;
              card.classList.add("longpress-active");
            }
          }, LONG_PRESS_DELAY);
        }
      } else {
        state.gesture = null;
      }
    }, { passive:true });

    stage.addEventListener("touchmove", (e) => {
      if(!state.gesture) return;
      if(state.gesture.type === "drag" && e.touches.length === 1){
        e.preventDefault();
        const t = e.touches[0];
        const now = performance.now();
        const dy = t.clientY - state.gesture.lastY;
        const dt = Math.max(1, now - state.gesture.lastTime);

        const totalDx = Math.abs(t.clientX - state.gesture.startX);
        const totalDy = Math.abs(t.clientY - state.gesture.startY);
        if(totalDx > TAP_MOVE_THRESHOLD || totalDy > TAP_MOVE_THRESHOLD){
          state.gesture.moved = true;
          clearLongPress();
        }

        state.centerDateMs -= dy * msPerPixel();
        state.gesture.velocity = dy / dt;
        state.gesture.lastY = t.clientY;
        state.gesture.lastTime = now;
        requestRender();
      }
    }, { passive:false });

    stage.addEventListener("touchend", () => {
      if(!state.gesture) return;
      const g = state.gesture;
      const elapsed = performance.now() - g.startTime;

      clearLongPress();

      if(g.longPressed){
        /* Long press was triggered — just dismiss, no action on release */
      } else if(!g.moved && elapsed < TAP_TIME_THRESHOLD){
        /* Short tap → open info panel (read mode) */
        const card = g.target.closest && g.target.closest(".event-card");
        if(card && card.dataset.eventId){
          openInfoPanel(card.dataset.eventId);
        }
      } else {
        const velocity = g.velocity || 0;
        if(Math.abs(velocity) > 0.02){
          startFling(velocity);
        }
      }
      state.gesture = null;
    }, { passive:true });

    /* Desktop: click → info panel */
    stage.addEventListener("click", (e) => {
      const card = e.target.closest && e.target.closest(".event-card");
      if(card && card.dataset.eventId){
        openInfoPanel(card.dataset.eventId);
      }
    });

    stage.addEventListener("wheel", (e) => {
      e.preventDefault();
      stopFling();
      state.centerDateMs += e.deltaY * msPerPixel();
      requestRender();
    }, { passive:false });
  }

  /* ── Info Panel (Read Mode) ── */
  function openInfoPanel(id){
    const ev = state.events.find(e => e.id === id);
    if(!ev) return;
    state.infoPanelId = id;

    els.infoPanelDate.textContent = formatEventDate(ev);
    els.infoPanelTitle.textContent = ev.title || "Ohne Titel";
    els.infoPanelText.textContent = ev.info || "";
    els.infoPanelText.style.display = ev.info ? "block" : "none";

    /* Build meta badges */
    let metaHtml = "";
    if(ev.priority) metaHtml += `<span class="info-badge">P${ev.priority}</span>`;
    if(ev.theme) metaHtml += `<span class="info-badge">${escapeHtml(ev.theme)}</span>`;
    if(ev.source) metaHtml += `<span class="info-badge">${escapeHtml(ev.source)}</span>`;
    if(Array.isArray(ev.tags) && ev.tags.length){
      ev.tags.forEach(t => { metaHtml += `<span class="info-badge">${escapeHtml(t)}</span>`; });
    }
    els.infoPanelMeta.innerHTML = metaHtml;
    els.infoPanelMeta.style.display = metaHtml ? "flex" : "none";

    if(ev.link){
      els.infoPanelLink.href = ev.link;
      els.infoPanelLink.textContent = ev.link;
      els.infoPanelLink.style.display = "inline-block";
    } else {
      els.infoPanelLink.style.display = "none";
    }

    els.infoPanelBackdrop.classList.add("open");
  }

  function closeInfoPanel(){
    els.infoPanelBackdrop.classList.remove("open");
    state.infoPanelId = null;
  }

  /* ── Modal ── */
  function openCreateModal(prefillDateMs = state.centerDateMs){
    state.editingId = null;
    els.eventModalTitle.textContent = "Ereignis hinzuf\u00fcgen";
    els.deleteEventBtn.style.display = "none";
    els.addToTabBtn.style.display = "none";
    els.eventStart.value = formatDateTimeISOForInput(new Date(prefillDateMs).toISOString());
    els.eventEnd.value = "";
    els.eventTitle.value = "";
    els.eventInfo.value = "";
    els.eventPriority.value = 5;
    els.eventTheme.value = !state.activeThemes.has("ALLE") && state.activeThemes.size === 1 ? [...state.activeThemes][0] : "";
    els.eventColor.value = "#7aa2ff";
    els.eventSource.value = "";
    els.eventLink.value = "";
    els.eventTags.value = "";
    els.eventModalBackdrop.classList.add("open");
  }

  function openEditModal(id){
    const ev = state.events.find(e => e.id === id);
    if(!ev) return;
    state.editingId = id;
    els.eventModalTitle.textContent = "Ereignis bearbeiten";
    els.deleteEventBtn.style.display = "inline-flex";
    const hasUserTabs = state.tabs.some(t => !t.isMain);
    els.addToTabBtn.style.display = hasUserTabs ? "inline-flex" : "none";
    els.eventStart.value = formatDateTimeISOForInput(ev.start);
    els.eventEnd.value = ev.end ? formatDateTimeISOForInput(ev.end) : "";
    els.eventTitle.value = ev.title || "";
    els.eventInfo.value = ev.info || "";
    els.eventPriority.value = ev.priority || 1;
    els.eventTheme.value = ev.theme || "";
    els.eventColor.value = ev.color || "#7aa2ff";
    els.eventSource.value = ev.source || "";
    els.eventLink.value = ev.link || "";
    els.eventTags.value = Array.isArray(ev.tags) ? ev.tags.join(", ") : "";
    els.eventModalBackdrop.classList.add("open");
  }

  function closeEventModal(){
    els.eventModalBackdrop.classList.remove("open");
  }

  function closeImportModal(){
    els.importModalBackdrop.classList.remove("open");
  }

  function collectFormEvent(){
    const start = els.eventStart.value ? new Date(els.eventStart.value).toISOString() : new Date().toISOString();
    const end = els.eventEnd.value ? new Date(els.eventEnd.value).toISOString() : "";

    return normalizeEvents([{
      id: state.editingId || makeId(),
      start,
      end,
      title: els.eventTitle.value.trim() || "Ohne Titel",
      info: els.eventInfo.value.trim(),
      priority: parseInt(els.eventPriority.value, 10) || 1,
      theme: els.eventTheme.value.trim() || "Allgemein",
      color: els.eventColor.value || "#7aa2ff",
      source: els.eventSource.value.trim(),
      link: els.eventLink.value.trim(),
      tags: els.eventTags.value.split(",").map(s => s.trim()).filter(Boolean)
    }])[0];
  }

  function saveFormEvent(){
    const ev = collectFormEvent();

    if(state.editingId){
      const idx = state.events.findIndex(e => e.id === state.editingId);
      if(idx !== -1) state.events[idx] = ev;
      showToast("Ereignis aktualisiert");
    } else {
      state.events.push(ev);
      /* If creating from a user tab, auto-assign to that tab */
      if(state.activeTabId !== "__main__"){
        if(!state.tabAssignments[state.activeTabId]){
          state.tabAssignments[state.activeTabId] = [];
        }
        if(!state.tabAssignments[state.activeTabId].includes(ev.id)){
          state.tabAssignments[state.activeTabId].push(ev.id);
          saveTabAssignments();
        }
      }
      showToast("Ereignis hinzugef\u00fcgt");
    }

    sortEvents();
    saveEvents();
    renderFilterBar();
    requestRender();
    renderSearchResults();
    closeEventModal();
  }

  function deleteCurrentEvent(){
    if(!state.editingId) return;
    const evId = state.editingId;
    const idx = state.events.findIndex(e => e.id === evId);
    if(idx !== -1){
      state.events.splice(idx, 1);
      /* Remove from all tab assignments */
      for(const tabId in state.tabAssignments){
        state.tabAssignments[tabId] = state.tabAssignments[tabId].filter(id => id !== evId);
      }
      saveTabAssignments();
      saveEvents();
      renderFilterBar();
      requestRender();
      renderSearchResults();
      showToast("Ereignis gel\u00f6scht");
    }
    closeEventModal();
  }

  /* ── Copy / Import (workspace-scoped) ── */
  async function copyAllData(){
    const wsName = state.tabs.find(w => w.id === state.activeTabId)?.name || "";
    const eventsToExport = getActiveTabEvents();
    const data = JSON.stringify(eventsToExport, null, 2);
    try{
      await navigator.clipboard.writeText(data);
      showToast(`„${wsName}" kopiert (${eventsToExport.length} Ereignisse)`);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = data;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
      showToast(`„${wsName}" kopiert`);
    }
  }

  function applyImport(){
    try{
      const parsed = JSON.parse(els.importTextarea.value);

      const newEvents = Array.isArray(parsed)
        ? parsed
        : [parsed];

      const normalized = normalizeEvents(newEvents);

      normalized.forEach(ev => {
        if (!ev.id || ev.id === "auto") {
          ev.id = makeId();
        }
      });

      state.events = [...state.events, ...normalized];
      sortEvents();
      saveEvents();
      renderFilterBar();
      requestRender();
      renderSearchResults();
      closeImportModal();
      const wsName = state.tabs.find(w => w.id === state.activeTabId)?.name || "";
      showToast(`Import in „${wsName}" erfolgreich`);
    } catch (e){
      console.error(e);
      showToast("Import fehlgeschlagen");
    }
  }

  /* ── Search ── */
  function openSearch(){
    closeFilter();
    closeNotes();
    state.searchOpen = true;
    els.searchInlay.classList.add("open");
    els.searchInput.focus();
    renderSearchResults();
  }

  function closeSearch(){
    state.searchOpen = false;
    els.searchInlay.classList.remove("open");
    els.searchInput.blur();
  }

  function toggleSearch(){
    if(state.searchOpen) closeSearch();
    else openSearch();
  }

  function buildSearchIndex(ev){
    const year = new Date(ev.start).getFullYear();
    const dateText = formatEventDate(ev);
    return {
      ev,
      year,
      parts: [
        { type:"title", text: ev.title || "" },
        { type:"info", text: ev.info || "" },
        { type:"date", text: dateText },
        { type:"theme", text: ev.theme || "" },
        { type:"tags", text: Array.isArray(ev.tags) ? ev.tags.join(", ") : "" }
      ]
    };
  }

  function bestMatchForQuery(query, entry){
    const q = query.trim().toLowerCase();
    if(!q){
      return {
        score: 1,
        text: entry.ev.title || entry.ev.theme || formatEventDate(entry.ev)
      };
    }

    let best = null;

    for(const part of entry.parts){
      const text = String(part.text || "");
      const lower = text.toLowerCase();
      const idx = lower.indexOf(q);
      if(idx !== -1){
        const scoreBase = part.type === "title" ? 100 :
                          part.type === "date" ? 90 :
                          part.type === "info" ? 80 :
                          part.type === "theme" ? 70 : 60;
        const snippet = text.slice(Math.max(0, idx - 18), Math.min(text.length, idx + q.length + 28)).trim();
        const score = scoreBase - idx * 0.01;
        if(!best || score > best.score){
          best = { score, text: snippet || text };
        }
      }
    }

    if(!best){
      let looseScore = 0;
      const tokens = q.split(/\s+/).filter(Boolean);
      let looseText = "";
      for(const part of entry.parts){
        const lower = String(part.text || "").toLowerCase();
        let hits = 0;
        for(const token of tokens){
          if(lower.includes(token)) hits++;
        }
        if(hits > 0){
          const score = hits * (part.type === "title" ? 20 : 12);
          if(score > looseScore){
            looseScore = score;
            looseText = String(part.text || "");
          }
        }
      }
      if(looseScore > 0){
        best = { score: looseScore, text: looseText.slice(0, 50).trim() };
      }
    }

    return best;
  }

  function searchEvents(query){
    const entries = getActiveTabEvents().map(buildSearchIndex);
    const results = [];

    entries.forEach(entry => {
      const match = bestMatchForQuery(query, entry);
      if(match){
        results.push({
          ev: entry.ev,
          year: entry.year,
          score: match.score,
          matchText: match.text
        });
      }
    });

    results.sort((a,b) => b.score - a.score || new Date(a.ev.start) - new Date(b.ev.start));
    return results.slice(0, 50);
  }

  function renderSearchResults(){
    const q = els.searchInput.value.trim();
    state.searchQuery = q;
    els.searchResults.innerHTML = "";

    const results = searchEvents(q);

    if(results.length === 0){
      const empty = document.createElement("div");
      empty.className = "search-empty";
      empty.textContent = q ? "Keine passenden Treffer." : "Suche nach Titel, Beschreibung, Datum oder Tags.";
      els.searchResults.appendChild(empty);
      return;
    }

    results.forEach(result => {
      const item = document.createElement("button");
      item.className = "search-item";

      const main = `${result.year}-${result.ev.title || "Ohne Titel"}-[${result.matchText || ""}]`;
      item.innerHTML = `
        <div class="search-item-main">${escapeHtml(main)}</div>
        <div class="search-item-sub">${escapeHtml(formatEventDate(result.ev))} \u00b7 ${escapeHtml(result.ev.theme || "Allgemein")}</div>
      `;

      item.addEventListener("click", () => {
        state.centerDateMs = new Date(result.ev.start).getTime();
        requestRender();
        showToast("Zu Ereignis gesprungen");
        closeSearch();
      });

      els.searchResults.appendChild(item);
    });
  }

  /* ── Range Card Toggle ── */
  function toggleRangeCard(){
    els.rangeCard.classList.toggle("expanded");
    if(!els.rangeCard.classList.contains("expanded")){
      closeTopFilterPanel();
      els.rangeCard.classList.remove("filter-expanded");
    }
  }

  /* ── Top Filter Panel ── */
  function openTopFilterPanel(){
    els.topFilterPanel.classList.add("open");
    els.rangeCard.classList.add("filter-expanded");
    renderTopFilterList();
    updateTopFilterBtnStyle();
  }

  function closeTopFilterPanel(){
    els.topFilterPanel.classList.remove("open");
    els.rangeCard.classList.remove("filter-expanded");
  }

  function toggleTopFilterPanel(e){
    if(e) e.stopPropagation();
    if(els.topFilterPanel.classList.contains("open")){
      closeTopFilterPanel();
    } else {
      openTopFilterPanel();
    }
  }

  function renderTopFilterList(){
    const themes = deriveThemes();
    els.topFilterList.innerHTML = "";
    themes.forEach(theme => {
      const btn = document.createElement("button");
      const isSelected = theme === "ALLE" ? state.activeThemes.has("ALLE") : (state.activeThemes.has("ALLE") || state.activeThemes.has(theme));
      btn.className = "filter-panel-option" + (isSelected ? " selected" : "");
      btn.innerHTML = `<span class="filter-panel-check">${isSelected ? "\u2713" : ""}</span>${escapeHtml(theme)}`;
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        toggleThemeSelection(theme);
      });
      els.topFilterList.appendChild(btn);
    });
  }

  function updateTopFilterBtnStyle(){
    if(!state.activeThemes.has("ALLE")){
      els.topFilterBtn.classList.add("active-filter");
    } else {
      els.topFilterBtn.classList.remove("active-filter");
    }
  }

  /* ── Filter Inlay (legacy, now redirected) ── */
  function openFilter(){
    closeSearch();
    closeNotes();
    state.filterOpen = true;
    /* Open the range card and its filter panel */
    els.rangeCard.classList.add("expanded");
    openTopFilterPanel();
    updateFilterBtnStyle();
  }

  function closeFilter(){
    state.filterOpen = false;
    closeTopFilterPanel();
  }

  function toggleFilter(){
    if(state.filterOpen) closeFilter();
    else openFilter();
  }

  function toggleThemeSelection(theme){
    const themes = deriveThemes().filter(t => t !== "ALLE");
    if(theme === "ALLE"){
      if(state.activeThemes.has("ALLE")){
        state.activeThemes.clear();
      } else {
        state.activeThemes.clear();
        state.activeThemes.add("ALLE");
      }
    } else {
      state.activeThemes.delete("ALLE");
      if(state.activeThemes.has(theme)){
        state.activeThemes.delete(theme);
      } else {
        state.activeThemes.add(theme);
      }
      if(themes.every(t => state.activeThemes.has(t))){
        state.activeThemes.clear();
        state.activeThemes.add("ALLE");
      }
      if(state.activeThemes.size === 0){
        state.activeThemes.add("ALLE");
      }
    }
    renderFilterBar();
    renderFilterList();
    renderTopFilterList();
    updateFilterBtnStyle();
    updateTopFilterBtnStyle();
    requestRender();
  }

  function updateFilterBtnStyle(){
    if(!state.activeThemes.has("ALLE")){
      els.topFilterBtn.classList.add("active-filter");
    } else {
      els.topFilterBtn.classList.remove("active-filter");
    }
  }

  function renderFilterList(){
    const themes = deriveThemes();
    els.filterList.innerHTML = "";
    themes.forEach(theme => {
      const btn = document.createElement("button");
      const isSelected = theme === "ALLE" ? state.activeThemes.has("ALLE") : (state.activeThemes.has("ALLE") || state.activeThemes.has(theme));
      btn.className = "filter-option" + (isSelected ? " selected" : "");
      btn.innerHTML = `<span class="filter-option-check">${isSelected ? "\u2713" : ""}</span>${escapeHtml(theme)}`;
      btn.addEventListener("click", () => {
        toggleThemeSelection(theme);
      });
      els.filterList.appendChild(btn);
    });
  }

  /* ── Notes System ── */
  function openNotes(){
    closeSearch();
    closeFilter();
    state.notesOpen = true;
    els.notesInlay.classList.add("open");
    state.editingNoteId = null;
    renderNotesList();
  }

  function closeNotes(){
    state.notesOpen = false;
    els.notesInlay.classList.remove("open");
    state.editingNoteId = null;
  }

  function toggleNotes(){
    if(state.notesOpen) closeNotes();
    else openNotes();
  }

  function renderNotesList(){
    els.notesList.innerHTML = "";

    if(state.notes.length === 0 && !state.editingNoteId){
      const empty = document.createElement("div");
      empty.className = "notes-empty";
      empty.textContent = "Noch keine Notizen vorhanden.";
      els.notesList.appendChild(empty);
      return;
    }

    state.notes.forEach(note => {
      const card = document.createElement("div");
      card.className = "note-card";

      if(state.editingNoteId === note.id){
        card.innerHTML = `
          <textarea class="note-edit-area">${escapeHtml(note.text)}</textarea>
          <div class="note-save-row">
            <button class="note-save-btn">Speichern</button>
            <button class="note-cancel-btn">Abbrechen</button>
          </div>
        `;
        const textarea = card.querySelector(".note-edit-area");
        card.querySelector(".note-save-btn").addEventListener("click", () => {
          const val = textarea.value.trim();
          if(val){
            note.text = val;
            saveNotes();
            showToast("Notiz gespeichert");
          } else {
            state.notes = state.notes.filter(n => n.id !== note.id);
          }
          state.editingNoteId = null;
          renderNotesList();
        });
        card.querySelector(".note-cancel-btn").addEventListener("click", () => {
          if(!note.text){
            state.notes = state.notes.filter(n => n.id !== note.id);
          }
          state.editingNoteId = null;
          renderNotesList();
        });
      } else {
        card.innerHTML = `
          <div class="note-text">${escapeHtml(note.text)}</div>
          <div class="note-actions">
            <button class="note-edit-btn">Bearbeiten</button>
            <button class="note-delete-btn">L\u00f6schen</button>
          </div>
        `;
        card.querySelector(".note-edit-btn").addEventListener("click", () => {
          state.editingNoteId = note.id;
          renderNotesList();
        });
        card.querySelector(".note-delete-btn").addEventListener("click", () => {
          state.notes = state.notes.filter(n => n.id !== note.id);
          saveNotes();
          showToast("Notiz gel\u00f6scht");
          renderNotesList();
        });
      }
      els.notesList.appendChild(card);
    });
  }

  function startNewNote(){
    const newNote = { id: makeId(), text: "" };
    state.notes.unshift(newNote);
    state.editingNoteId = newNote.id;
    renderNotesList();
    const textarea = els.notesList.querySelector(".note-edit-area");
    if(textarea) textarea.focus();
  }

  /* ── Event Handlers ── */
  function attachEventHandlers(){
    els.fabAdd.addEventListener("click", () => openCreateModal());
    els.searchBtn.addEventListener("click", toggleSearch);
    els.notesBtn.addEventListener("click", toggleNotes);
    els.notesCloseBtn.addEventListener("click", closeNotes);
    els.noteAddBtn.addEventListener("click", startNewNote);
    els.zoomInBtn.addEventListener("click", () => zoomAroundCenter(-1));
    els.zoomOutBtn.addEventListener("click", () => zoomAroundCenter(1));

    /* Range card expand/collapse */
    els.rangeCard.addEventListener("click", (e) => {
      /* Don't toggle when clicking buttons/inputs inside */
      if(e.target.closest("button") || e.target.closest("input") || e.target.closest(".topbar-filter-panel")) return;
      toggleRangeCard();
    });

    /* Top filter button */
    els.topFilterBtn.addEventListener("click", (e) => {
      toggleTopFilterPanel(e);
    });

    /* Close top filter panel when clicking outside */
    document.addEventListener("click", (e) => {
      if(els.topFilterPanel.classList.contains("open") && !e.target.closest(".topbar-filter-panel") && !e.target.closest("#topFilterBtn")){
        closeTopFilterPanel();
      }
    });

    els.searchCloseBtn.addEventListener("click", closeSearch);
    els.searchInput.addEventListener("input", renderSearchResults);

    els.copyBtn.addEventListener("click", copyAllData);
    els.importBtn.addEventListener("click", () => {
      els.importTextarea.value = "";
      els.importModalBackdrop.classList.add("open");
    });

    els.todayBtn.addEventListener("click", () => {
      state.centerDateMs = Date.now();
      requestRender();
      showToast("Zu heute gesprungen");
    });

    els.closeEventBtn.addEventListener("click", closeEventModal);
    els.saveEventBtn.addEventListener("click", saveFormEvent);
    els.deleteEventBtn.addEventListener("click", deleteCurrentEvent);

    /* Add to Tab button in modal */
    els.addToTabBtn.addEventListener("click", () => {
      if(state.editingId){
        closeEventModal();
        openAddToTabSheet(state.editingId);
      }
    });

    els.eventModalBackdrop.addEventListener("click", (e) => {
      if(e.target === els.eventModalBackdrop) closeEventModal();
    });

    /* Info panel handlers */
    els.infoPanelCloseBtn.addEventListener("click", closeInfoPanel);
    els.infoPanelBackdrop.addEventListener("click", (e) => {
      if(e.target === els.infoPanelBackdrop) closeInfoPanel();
    });
    els.infoPanelEditBtn.addEventListener("click", () => {
      const id = state.infoPanelId;
      closeInfoPanel();
      if(id) openEditModal(id);
    });

    els.closeImportBtn.addEventListener("click", closeImportModal);
    els.applyImportBtn.addEventListener("click", applyImport);

    els.importModalBackdrop.addEventListener("click", (e) => {
      if(e.target === els.importModalBackdrop) closeImportModal();
    });

    /* Tab Add button */
    els.tabAddBtn.addEventListener("click", createNewTab);

    /* Tab context menu actions */
    els.tabCtxRename.addEventListener("click", () => {
      if(state.ctxTabId) openRenameDialog(state.ctxTabId);
    });
    els.tabCtxDelete.addEventListener("click", () => {
      if(state.ctxTabId){
        const id = state.ctxTabId;
        closeTabContextMenu();
        deleteTab(id);
      }
    });

    /* Close context menu on outside click */
    document.addEventListener("click", (e) => {
      if(!e.target.closest(".tab-ctx-menu") && !e.target.closest(".ws-tab")){
        closeTabContextMenu();
      }
    });

    /* Rename dialog */
    els.renameSaveBtn.addEventListener("click", confirmRename);
    els.renameCancelBtn.addEventListener("click", closeRenameDialog);
    els.renameInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") confirmRename();
      if(e.key === "Escape") closeRenameDialog();
    });
    els.renameBackdrop.addEventListener("click", (e) => {
      if(e.target === els.renameBackdrop) closeRenameDialog();
    });

    /* Add-to-Tab sheet */
    els.addToTabClose.addEventListener("click", closeAddToTabSheet);
    els.addToTabBackdrop.addEventListener("click", (e) => {
      if(e.target === els.addToTabBackdrop) closeAddToTabSheet();
    });

    window.addEventListener("resize", requestRender);

    window.addEventListener("keydown", (e) => {
      if(e.key === "Escape"){
        closeEventModal();
        closeImportModal();
        closeSearch();
        closeFilter();
        closeNotes();
        closeTopFilterPanel();
        closeTabContextMenu();
        closeRenameDialog();
        closeAddToTabSheet();
      }
      if(e.key === "+" || e.key === "="){
        zoomAroundCenter(-1);
      }
      if(e.key === "-"){
        zoomAroundCenter(1);
      }
      if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "f"){
        e.preventDefault();
        openSearch();
      }
    });
  }

  /* ── Init ── */
  function init(){
    loadTabsMeta();
    loadTabAssignments();
    loadEvents();
    loadNotes();
    renderTabBar();
    renderFilterBar();
    updateFilterBtnStyle();
    attachGestures();
    attachEventHandlers();
    requestRender();
    renderSearchResults();
  }

  init();
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
