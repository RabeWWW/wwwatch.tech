<!DOCTYPE html>
<html lang="de">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08101f">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2">
<link rel="icon" type="image/x-icon" href="favicon.ico?v=2">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Interaktive Zeitstrahl-App</title>
  <style>
    :root{
      --bg:#08101f;
      --bg2:#0d1730;
      --panel:#10192d;
      --panel2:#17233d;
      --soft:#9aa7cb;
      --text:#eef3ff;
      --accent:#7aa2ff;
      --accent2:#5d88f2;
      --danger:#ff6278;
      --success:#58d68d;
      --warn:#f5c542;
      --shadow:0 14px 38px rgba(0,0,0,.34);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,var(--bg),#0b1430 55%, #08101f);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    button,input,textarea{
      font:inherit;
    }

    .app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    /* ── Topbar ── */
    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:50;
      padding:calc(10px + var(--safe-top)) 12px 8px;
      background:linear-gradient(180deg, rgba(6,10,22,.95), rgba(6,10,22,.82) 80%, rgba(6,10,22,.14));
      backdrop-filter:blur(14px);
    }

    /* ── Tab Bar ── */
    .tab-bar-wrap{
      display:flex;
      align-items:center;
      gap:0;
      margin-bottom:8px;
      background:rgba(255,255,255,.04);
      border-radius:14px;
      padding:3px;
      border:1px solid rgba(255,255,255,.06);
    }

    .tab-bar-scroll{
      display:flex;
      gap:4px;
      overflow-x:auto;
      overflow-y:hidden;
      flex:1;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      scroll-behavior:smooth;
    }
    .tab-bar-scroll::-webkit-scrollbar{ display:none; }

    .ws-tab{
      flex:0 0 auto;
      border:none;
      border-radius:11px;
      padding:10px 14px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      transition:all .2s ease;
      display:flex;
      align-items:center;
      gap:6px;
      background:transparent;
      color:var(--soft);
      white-space:nowrap;
      position:relative;
    }

    .ws-tab.main-tab{
      font-weight:800;
    }

    .ws-tab.active{
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      box-shadow:0 4px 16px rgba(93,136,242,.35);
    }

    .ws-tab .ws-count{
      font-size:11px;
      font-weight:700;
      background:rgba(255,255,255,.15);
      padding:2px 6px;
      border-radius:999px;
      min-width:20px;
      text-align:center;
    }

    .ws-tab.active .ws-count{
      background:rgba(255,255,255,.25);
    }

    .tab-add-btn{
      flex:0 0 auto;
      border:none;
      border-radius:11px;
      width:38px;
      height:38px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      color:var(--soft);
      transition:all .2s ease;
      margin-left:2px;
    }
    .tab-add-btn:active{
      background:rgba(255,255,255,.08);
    }

    /* Tab context menu (long-press / right-click) */
    .tab-ctx-menu{
      position:fixed;
      z-index:200;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.1);
      border-radius:14px;
      padding:6px;
      box-shadow:0 12px 32px rgba(0,0,0,.5);
      min-width:160px;
      display:none;
    }
    .tab-ctx-menu.open{ display:block; }
    .tab-ctx-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
      width:100%;
      border-radius:10px;
      cursor:pointer;
      text-align:left;
    }
    .tab-ctx-item:active{ background:rgba(255,255,255,.06); }
    .tab-ctx-item.danger{ color:var(--danger); }

    /* Tab indicator */
    .tab-indicator{
      height:3px;
      border-radius:999px;
      margin-bottom:6px;
      background:linear-gradient(90deg,#7aa2ff,#5d88f2);
      transition:background .3s ease;
    }

    /* ── Add-to-Tab Sheet ── */
    .addtotab-backdrop{
      position:fixed;
      inset:0;
      z-index:150;
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(6px);
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease;
    }
    .addtotab-backdrop.open{
      opacity:1;
      pointer-events:auto;
    }
    .addtotab-sheet{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      max-height:60vh;
      background:var(--panel);
      border-radius:20px 20px 0 0;
      padding:16px 16px calc(16px + var(--safe-bottom));
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.22,1,.36,1);
      overflow-y:auto;
    }
    .addtotab-backdrop.open .addtotab-sheet{
      transform:translateY(0);
    }
    .addtotab-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:12px;
    }
    .addtotab-header h3{
      margin:0;
      font-size:16px;
      font-weight:700;
    }
    .addtotab-close{
      border:none;
      background:rgba(255,255,255,.08);
      color:var(--text);
      width:32px;
      height:32px;
      border-radius:50%;
      font-size:18px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .addtotab-list{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .addtotab-option{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      background:rgba(255,255,255,.03);
      color:var(--text);
      font-size:15px;
      cursor:pointer;
      transition:background .15s;
    }
    .addtotab-option:active{
      background:rgba(255,255,255,.08);
    }
    .addtotab-option .check{
      color:var(--success);
      font-size:18px;
    }
    .addtotab-empty{
      text-align:center;
      color:var(--soft);
      padding:20px 0;
      font-size:14px;
    }

    /* Rename dialog */
    .rename-backdrop{
      position:fixed;
      inset:0;
      z-index:200;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }
    .rename-backdrop.open{
      opacity:1;
      pointer-events:auto;
    }
    .rename-dialog{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px;
      padding:20px;
      width:calc(100% - 40px);
      max-width:340px;
      box-shadow:0 16px 40px rgba(0,0,0,.5);
    }
    .rename-dialog h3{
      margin:0 0 12px;
      font-size:16px;
    }
    .rename-dialog input{
      width:100%;
      padding:12px 14px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      background:rgba(255,255,255,.04);
      color:var(--text);
      font-size:15px;
      outline:none;
      margin-bottom:14px;
    }
    .rename-dialog input:focus{
      border-color:var(--accent);
    }
    .rename-dialog .row{
      display:flex;
      gap:8px;
      justify-content:flex-end;
    }

    .range-card{
      background:rgba(15,23,43,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:10px 14px 8px;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
    }

    .range-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .range-header-left{
      flex:1;
      min-width:0;
    }

    .range-title{
      font-size:12px;
      color:var(--soft);
      letter-spacing:.05em;
      text-transform:uppercase;
      margin-bottom:4px;
    }

    .range-value{
      font-size:20px;
      font-weight:800;
      line-height:1.15;
      letter-spacing:-.02em;
    }

    .range-chevron{
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      transition:transform .25s ease;
      color:var(--soft);
    }

    .range-chevron svg{
      width:18px;
      height:18px;
    }

    .range-card.expanded .range-chevron{
      transform:rotate(180deg);
    }

    .range-details{
      max-height:0;
      overflow:hidden;
      transition:max-height .3s ease, opacity .2s ease;
      opacity:0;
      display:flex;
      flex-direction:column;
    }

    .range-card.expanded .range-details{
      max-height:200px;
      opacity:1;
    }

    .range-card.filter-expanded .range-details{
      max-height:80vh;
      overflow-y:auto;
      transition:max-height .3s ease, opacity .2s ease;
    }

    .meta-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:8px;
    }

    .pill{
      padding:6px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      color:var(--soft);
      font-size:11px;
      border:1px solid rgba(255,255,255,.06);
      white-space:nowrap;
    }

    /* ── Action Groups ── */
    .action-groups{
      display:flex;
      gap:6px;
      margin-top:8px;
      overflow:auto;
      scrollbar-width:none;
    }
    .action-groups::-webkit-scrollbar{ display:none; }

    .action-group{
      display:flex;
      gap:4px;
      flex-shrink:0;
    }

    .action-divider{
      width:1px;
      background:rgba(255,255,255,.08);
      margin:4px 2px;
      flex-shrink:0;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:9px 12px;
      background:var(--panel2);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 4px 12px rgba(0,0,0,.2);
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
      display:flex;
      align-items:center;
      gap:5px;
    }

    .btn.ghost{
      background:rgba(255,255,255,.04);
      box-shadow:none;
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
    }

    .btn.danger{
      background:linear-gradient(180deg,#ff7589,#e5445d);
    }

    .btn-nav{
      background:rgba(122,162,255,.12);
      color:#8cb0ff;
      border-color:rgba(122,162,255,.15);
    }

    .btn-data{
      background:rgba(88,214,141,.1);
      color:#58d68d;
      border-color:rgba(88,214,141,.12);
    }

    .btn-icon{
      font-size:14px;
      line-height:1;
    }

    .toolbar{
      display:none;
    }

    .toolbar-inner{
      display:none;
    }

    .chip{
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:10px 12px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.08);
      white-space:nowrap;
      cursor:pointer;
    }

    .chip.active{
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
    }

    /* ── Filter Panel (inside top inlay) ── */
    .topbar-filter-panel{
      max-height:0;
      overflow:hidden;
      transition:max-height .3s ease, opacity .25s ease;
      opacity:0;
      margin-top:0;
    }

    .topbar-filter-panel.open{
      max-height:calc(80vh - 120px);
      opacity:1;
      margin-top:8px;
    }

    .topbar-filter-panel .filter-panel-title{
      font-size:13px;
      font-weight:800;
      color:var(--soft);
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .topbar-filter-panel .filter-panel-list{
      display:flex;
      flex-direction:column;
      gap:4px;
      max-height:calc(80vh - 180px);
      overflow-y:auto;
      scrollbar-width:thin;
      -webkit-overflow-scrolling:touch;
    }

    .topbar-filter-panel .filter-panel-option{
      border:none;
      width:100%;
      text-align:left;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text);
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:background .15s ease, transform .1s ease;
    }

    .topbar-filter-panel .filter-panel-option:active{
      transform:scale(.98);
    }

    .topbar-filter-panel .filter-panel-option:hover{
      background:rgba(255,255,255,.08);
    }

    .topbar-filter-panel .filter-panel-option.selected{
      background:linear-gradient(180deg,rgba(140,176,255,.25),rgba(93,136,242,.2));
      color:#fff;
      border-color:rgba(122,162,255,.3);
    }

    .topbar-filter-panel .filter-panel-check{
      width:14px;
      height:14px;
      border-radius:4px;
      border:2px solid rgba(255,255,255,.25);
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
      color:transparent;
    }

    .topbar-filter-panel .filter-panel-option.selected .filter-panel-check{
      background:#7aa2ff;
      border-color:#7aa2ff;
      color:#fff;
    }

    .btn-filter-inline{
      background:rgba(122,162,255,.12);
      color:#8cb0ff;
      border-color:rgba(122,162,255,.15);
    }

    .btn-filter-inline.active-filter{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .timeline-stage{
      position:absolute;
      inset:0;
      padding-top:160px;
      padding-bottom:140px;
      overflow:hidden;
      touch-action:none;
      user-select:none;
    }

    .timeline-canvas{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .center-line{
      position:absolute;
      left:26px;
      top:50%;
      transform:translateY(-50%);
      width:3px;
      height:74px;
      border-radius:999px;
      background:linear-gradient(180deg,rgba(122,162,255,.06),rgba(122,162,255,.96),rgba(122,162,255,.06));
      box-shadow:0 0 26px rgba(122,162,255,.32);
      pointer-events:none;
      z-index:3;
    }

    .center-dot{
      position:absolute;
      left:18px;
      top:50%;
      transform:translateY(-50%);
      width:19px;
      height:19px;
      border-radius:50%;
      background:#e3ecff;
      border:4px solid #6c94f5;
      box-shadow:0 0 0 6px rgba(122,162,255,.13),0 0 22px rgba(122,162,255,.28);
      pointer-events:none;
      z-index:4;
    }

    .marker{
      position:absolute;
      left:18px;
      right:12px;
      display:flex;
      align-items:center;
      gap:10px;
      pointer-events:none;
      z-index:1;
    }

    .marker .tick{
      width:18px;
      height:2px;
      background:#8a98c4;
      opacity:.6;
      flex:0 0 auto;
    }

    .marker .label{
      color:#b8c5ea;
      font-size:12px;
      font-weight:700;
      background:rgba(8,13,26,.54);
      border:1px solid rgba(255,255,255,.06);
      padding:5px 8px;
      border-radius:999px;
      backdrop-filter:blur(10px);
      letter-spacing:.02em;
    }

    .event-card{
      position:absolute;
      left:46px;
      right:12px;
      background:linear-gradient(180deg,rgba(20,28,49,.97),rgba(15,21,37,.97));
      border:1px solid rgba(255,255,255,.08);
      border-left:4px solid var(--cardColor,#7aa2ff);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:10px 12px 10px 13px;
      cursor:pointer;
      transition:transform .12s ease;
      z-index:2;
      touch-action:pan-y;
      pointer-events:auto;
      overflow:hidden;
    }

    .event-card:active{
      transform:scale(.99);
    }

    .event-date{
      font-size:11px;
      color:#b8c4ea;
      margin-bottom:4px;
      font-weight:700;
    }

    .event-title{
      font-size:14px;
      font-weight:800;
      line-height:1.25;
      margin:0;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .event-card.longpress-active{
      transform:scale(1.02);
      box-shadow:0 6px 24px rgba(122,162,255,.25);
      z-index:5;
    }
    .event-card.longpress-active .event-title{
      -webkit-line-clamp:unset;
      overflow:visible;
    }

    .event-info{
      font-size:14px;
      line-height:1.35;
      color:#d5def8;
      font-style:italic;
      opacity:.92;
      margin-bottom:10px;
    }

    .event-meta{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      align-items:center;
    }

    .badge{
      font-size:11px;
      color:#d7def5;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.07);
      padding:5px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

    .priority{
      position:absolute;
      right:10px;
      top:10px;
      font-size:10px;
      font-weight:900;
      padding:4px 7px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .empty{
      position:absolute;
      left:46px;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      padding:18px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:#c9d2ef;
      line-height:1.45;
      text-align:center;
      z-index:2;
    }

    .bottom-hint{
      position:fixed;
      right:12px;
      left:12px;
      bottom:calc(14px + var(--safe-bottom));
      z-index:15;
      background:rgba(14,20,36,.78);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px 12px;
      color:#c4ceeb;
      font-size:12px;
      box-shadow:var(--shadow);
      display:flex;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }

    .fab-row{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:calc(84px + var(--safe-bottom));
      z-index:65;
      display:flex;
      align-items:flex-end;
      gap:12px;
    }

    .fab-search{
      min-width:46px;
      height:46px;
      padding:0 13px;
      border:none;
      border-radius:14px;
      background:rgba(22,30,50,.92);
      color:var(--soft);
      font-weight:800;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 24px rgba(0,0,0,.3);
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      backdrop-filter:blur(10px);
    }

    .fab-search svg{
      width:18px;
      height:18px;
      display:block;
    }

    .fab-add{
      width:72px;
      height:72px;
      border:none;
      border-radius:22px;
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      font-size:38px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 32px rgba(0,0,0,.35),0 6px 20px rgba(92,136,242,.4),0 0 0 4px rgba(122,162,255,.15);
      border:1px solid rgba(255,255,255,.22);
      cursor:pointer;
      position:relative;
      bottom:8px;
    }

    .fab-add:active,
    .fab-search:active,
    .zoom-btn:active{
      transform:scale(.96);
    }

    .zoom-stack{
      position:fixed;
      right:calc(12px + var(--safe-right));
      top:50%;
      transform:translateY(-50%);
      z-index:66;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .zoom-btn{
      width:52px;
      height:52px;
      border:none;
      border-radius:16px;
      background:linear-gradient(180deg,#19243d,#0f172c);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 16px 36px rgba(0,0,0,.34);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:28px;
      font-weight:800;
      line-height:1;
    }

    .zoom-btn.zoom-in{
      background:linear-gradient(180deg,#27406e,#16284a);
    }

    .zoom-btn.zoom-out{
      background:linear-gradient(180deg,#23314e,#141e33);
    }

    .search-inlay{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(156px + var(--safe-bottom));
      z-index:64;
      background:linear-gradient(180deg,rgba(18,25,43,.98),rgba(11,17,32,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 22px 60px rgba(0,0,0,.42);
      padding:12px;
      backdrop-filter:blur(16px);
      display:none;
    }

    .search-inlay.open{
      display:block;
    }

    .search-top{
      display:flex;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
    }

    .search-input{
      flex:1;
      width:100%;
      border:none;
      outline:none;
      color:var(--text);
      background:#0f1628;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 12px;
    }

    .search-close{
      border:none;
      border-radius:14px;
      padding:12px 14px;
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
      cursor:pointer;
    }

    .search-results{
      max-height:260px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:2px;
      scrollbar-width:thin;
    }

    .search-empty{
      padding:14px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      color:#c9d2ef;
      border:1px dashed rgba(255,255,255,.1);
      line-height:1.4;
    }

    .search-item{
      border:none;
      width:100%;
      text-align:left;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:#fff;
      cursor:pointer;
    }

    .search-item-main{
      font-weight:800;
      line-height:1.35;
      font-size:14px;
      word-break:break-word;
    }

    .search-item-sub{
      margin-top:6px;
      color:#b8c4ea;
      font-size:12px;
      line-height:1.35;
    }

    /* ── Info Panel (Read Mode) ── */
    .info-panel-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.48);
      backdrop-filter:blur(10px);
      z-index:90;
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:14px;
    }
    .info-panel-backdrop.open{
      display:flex;
    }
    .info-panel{
      width:min(820px,100%);
      max-height:min(75vh,700px);
      overflow:auto;
      border-radius:24px;
      background:linear-gradient(180deg,#141c31,#0e1424);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:18px 18px calc(18px + var(--safe-bottom));
    }
    .info-panel .info-title{
      font-size:20px;
      font-weight:800;
      line-height:1.3;
      margin:0 0 10px;
      color:#fff;
    }
    .info-panel .info-date{
      font-size:13px;
      color:#7aa2ff;
      font-weight:700;
      margin-bottom:10px;
    }
    .info-panel .info-text{
      font-size:15px;
      line-height:1.5;
      color:#d5def8;
      margin-bottom:14px;
      white-space:pre-wrap;
    }
    .info-panel .info-meta{
      display:flex;
      flex-wrap:wrap;
      gap:7px;
      margin-bottom:14px;
    }
    .info-panel .info-badge{
      font-size:11px;
      color:#d7def5;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.07);
      padding:5px 8px;
      border-radius:999px;
    }
    .info-panel .info-link{
      display:inline-block;
      color:#7aa2ff;
      font-size:13px;
      margin-bottom:14px;
      word-break:break-all;
    }
    .info-panel .info-actions{
      display:flex;
      gap:8px;
      margin-top:8px;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.48);
      backdrop-filter:blur(10px);
      z-index:100;
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:14px;
    }

    .modal-backdrop.open{
      display:flex;
    }

    .modal{
      width:min(820px,100%);
      max-height:min(88vh,900px);
      overflow:auto;
      border-radius:24px;
      background:linear-gradient(180deg,#141c31,#0e1424);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      padding:14px 14px calc(14px + var(--safe-bottom));
    }

    .modal h2{
      margin:6px 2px 12px;
      font-size:22px;
    }

    .grid{
      display:grid;
      gap:10px;
      grid-template-columns:1fr 1fr;
    }

    .grid .full{
      grid-column:1 / -1;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:12px;
      color:#b7c2e8;
      font-weight:700;
      letter-spacing:.02em;
    }

    .field input,
    .field textarea{
      width:100%;
      border:none;
      outline:none;
      color:var(--text);
      background:#0f1628;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 12px;
      resize:vertical;
    }

    .field textarea{
      min-height:90px;
    }

    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .import-area{
      min-height:180px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(236px + var(--safe-bottom));
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      transition:.25s ease;
      z-index:150;
      background:#11192d;
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:11px 14px;
      box-shadow:var(--shadow);
      pointer-events:none;
      max-width:calc(100% - 30px);
      text-align:center;
    }

    .toast.show{
      transform:translateX(-50%) translateY(0);
      opacity:1;
    }

    @media (min-width:700px){
      .center-line{ left:54px; }
      .center-dot{ left:46px; }
      .marker{ left:50px; right:18px; }
      .event-card{ left:86px; right:18px; max-width:820px; }
      .empty{ left:86px; right:18px; max-width:820px; }
      .bottom-hint{ left:auto; width:460px; }
      .zoom-stack{ right:20px; }
    }

    @media (max-width:560px){
      .grid{ grid-template-columns:1fr; }
      .range-value{ font-size:17px; }
      .bottom-hint{ font-size:11px; }
      .search-results{ max-height:220px; }
      .zoom-stack{
        top:auto;
        bottom:calc(160px + var(--safe-bottom));
        transform:none;
      }
      .ws-tab{ font-size:12px; padding:8px 6px; }
      .btn{ padding:8px 10px; font-size:11px; }
      .fab-add{ width:66px; height:66px; font-size:34px; border-radius:20px; }
      .fab-search, .fab-filter, .fab-notes{ min-width:42px; height:42px; }
    }

    /* Filter Inlay */
    .filter-inlay{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(156px + var(--safe-bottom));
      z-index:64;
      background:linear-gradient(180deg,rgba(18,25,43,.98),rgba(11,17,32,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 22px 60px rgba(0,0,0,.42);
      padding:12px;
      backdrop-filter:blur(16px);
      display:none;
    }
    .filter-inlay.open{ display:block; }
    .filter-inlay-title{
      font-size:14px;
      font-weight:800;
      margin-bottom:10px;
      color:var(--text);
    }
    .filter-list{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-height:300px;
      overflow:auto;
      scrollbar-width:thin;
    }
    .filter-option{
      border:none;
      width:100%;
      text-align:left;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text);
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:10px;
      transition:background .15s ease;
    }
    .filter-option:hover{ background:rgba(255,255,255,.08); }
    .filter-option.selected{
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      border-color:rgba(255,255,255,.18);
    }
    .filter-option-check{
      width:16px;
      height:16px;
      border-radius:4px;
      border:2px solid rgba(255,255,255,.3);
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      color:transparent;
    }
    .filter-option.selected .filter-option-check{
      background:#fff;
      border-color:#fff;
      color:#121727;
    }
    .fab-filter,
    .fab-notes{
      min-width:46px;
      height:46px;
      padding:0 13px;
      border:none;
      border-radius:14px;
      background:rgba(22,30,50,.92);
      color:var(--soft);
      font-weight:800;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 24px rgba(0,0,0,.3);
      border:1px solid rgba(255,255,255,.08);
      cursor:pointer;
      backdrop-filter:blur(10px);
    }
    .fab-filter svg,
    .fab-notes svg{
      width:18px;
      height:18px;
      display:block;
    }
    .fab-filter:active,
    .fab-notes:active{
      transform:scale(.96);
    }
    .fab-filter.active-filter{
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      border-color:rgba(255,255,255,.18);
    }

    /* Notes Inlay */
    .notes-inlay{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(156px + var(--safe-bottom));
      z-index:64;
      background:linear-gradient(180deg,rgba(18,25,43,.98),rgba(11,17,32,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 22px 60px rgba(0,0,0,.42);
      padding:12px;
      backdrop-filter:blur(16px);
      display:none;
    }
    .notes-inlay.open{ display:block; }
    .notes-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
    .notes-title{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }
    .notes-close{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
      font-weight:800;
      cursor:pointer;
    }
    .notes-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:320px;
      overflow:auto;
      scrollbar-width:thin;
    }
    .notes-empty{
      padding:18px 12px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      color:#c9d2ef;
      border:1px dashed rgba(255,255,255,.1);
      line-height:1.4;
      text-align:center;
    }
    .note-card{
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text);
    }
    .note-text{
      font-size:14px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .note-actions{
      display:flex;
      gap:6px;
      margin-top:8px;
    }
    .note-actions button{
      border:none;
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }
    .note-edit-btn{
      background:rgba(122,162,255,.2);
      color:#8cb0ff;
      border:1px solid rgba(122,162,255,.2);
    }
    .note-delete-btn{
      background:rgba(255,98,120,.15);
      color:#ff6278;
      border:1px solid rgba(255,98,120,.15);
    }
    .note-add-btn{
      border:none;
      width:100%;
      padding:12px;
      border-radius:14px;
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      margin-top:8px;
    }
    .note-add-btn:active{ transform:scale(.98); }
    .note-edit-area{
      width:100%;
      min-height:80px;
      border:none;
      outline:none;
      color:var(--text);
      background:#0f1628;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
      resize:vertical;
      font:inherit;
      font-size:14px;
    }
    .note-save-row{
      display:flex;
      gap:6px;
      margin-top:8px;
    }
    .note-save-btn{
      border:none;
      padding:8px 14px;
      border-radius:10px;
      background:linear-gradient(180deg,#8cb0ff,#5d88f2);
      color:#fff;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
    }
    .note-cancel-btn{
      border:none;
      padding:8px 14px;
      border-radius:10px;
      background:rgba(255,255,255,.06);
      color:#fff;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.08);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <!-- Tab Bar -->
    <div class="tab-bar-wrap" id="tabBarWrap">
      <div class="tab-bar-scroll" id="tabBarScroll"></div>
      <button class="tab-add-btn" id="tabAddBtn" title="Neuen Tab erstellen">+</button>
    </div>
    <div class="tab-indicator" id="tabIndicator"></div>

    <div class="range-card" id="rangeCard">
      <div class="range-header">
        <div class="range-header-left">
          <div class="range-title">Sichtbarer Zeitraum</div>
          <div class="range-value" id="rangeValue">&ndash;</div>
        </div>
        <div class="range-chevron" id="rangeChevron">
          <svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="range-details" id="rangeDetails">
        <div class="meta-row">
          <div class="pill" id="zoomLabel">Zoom: &ndash;</div>
          <div class="pill" id="priorityLabel">Sichtbar: Priorit&auml;t &ndash;</div>
          <div class="pill" id="eventCountLabel">0 sichtbare Ereignisse</div>
        </div>
        <div class="action-groups">
          <div class="action-group">
            <button class="btn btn-nav" id="todayBtn"><span class="btn-icon">&#x1F4CD;</span> Heute</button>
          </div>
          <div class="action-divider"></div>
          <div class="action-group">
            <button class="btn btn-data" id="copyBtn"><span class="btn-icon">&#x1F4CB;</span> Kopieren</button>
            <button class="btn btn-data" id="importBtn"><span class="btn-icon">&#x1F4E5;</span> Import</button>
          </div>
          <div class="action-divider"></div>
          <div class="action-group">
            <button class="btn btn-filter-inline" id="topFilterBtn"><span class="btn-icon">&#x1F50D;</span> Filter</button>
          </div>
        </div>
        <div class="topbar-filter-panel" id="topFilterPanel">
          <div class="filter-panel-title">Themenfilter</div>
          <div class="filter-panel-list" id="topFilterList"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-inner" id="filterBar"></div>
  </div>

  <div class="timeline-stage" id="timelineStage">
    <div class="timeline-canvas" id="timelineCanvas">
      <div class="center-line"></div>
      <div class="center-dot"></div>
    </div>
  </div>

  <div class="search-inlay" id="searchInlay">
    <div class="search-top">
      <input class="search-input" id="searchInput" type="text" placeholder="Suche nach Titel, Beschreibung, Datum ..." />
      <button class="search-close" id="searchCloseBtn">&#x2715;</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="filter-inlay" id="filterInlay">
    <div class="filter-inlay-title">Themenfilter</div>
    <div class="filter-list" id="filterList"></div>
  </div>

  <div class="notes-inlay" id="notesInlay">
    <div class="notes-header">
      <div class="notes-title">Notizen</div>
      <button class="notes-close" id="notesCloseBtn">&#x2715;</button>
    </div>
    <div class="notes-list" id="notesList"></div>
    <button class="note-add-btn" id="noteAddBtn">+ Notiz hinzuf&uuml;gen</button>
  </div>

  <div class="fab-row">
    <button class="fab-search" id="searchBtn" aria-label="Suche &ouml;ffnen">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2"></circle>
        <path d="M16.2 16.2L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </button>
    <button class="fab-add" id="fabAdd" aria-label="Ereignis hinzuf&uuml;gen">+</button>
    <button class="fab-notes" id="notesBtn" aria-label="Notizen &ouml;ffnen">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M8 8h8M8 12h6M8 16h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="zoom-stack">
    <button class="zoom-btn zoom-in" id="zoomInBtn" aria-label="Hereinzoomen">+</button>
    <button class="zoom-btn zoom-out" id="zoomOutBtn" aria-label="Herauszoomen">&minus;</button>
  </div>

  <div class="bottom-hint">
    <span>Wischen = Zeit bewegen</span>
    <span>Zoom rechts bedienen</span>
  </div>

  <!-- Add to Tab Bottom Sheet -->
  <div class="addtotab-backdrop" id="addToTabBackdrop">
    <div class="addtotab-sheet">
      <div class="addtotab-header">
        <h3>Hinzuf&uuml;gen zu&hellip;</h3>
        <button class="addtotab-close" id="addToTabClose">&times;</button>
      </div>
      <div class="addtotab-list" id="addToTabList"></div>
    </div>
  </div>

  <!-- Tab Context Menu -->
  <div class="tab-ctx-menu" id="tabCtxMenu">
    <button class="tab-ctx-item" id="tabCtxRename">&#9998; Umbenennen</button>
    <button class="tab-ctx-item danger" id="tabCtxDelete">&#128465; L&ouml;schen</button>
  </div>

  <!-- Rename Dialog -->
  <div class="rename-backdrop" id="renameBackdrop">
    <div class="rename-dialog">
      <h3>Tab umbenennen</h3>
      <input type="text" id="renameInput" placeholder="Tab-Name" maxlength="30" />
      <div class="row">
        <button class="btn ghost" id="renameCancelBtn">Abbrechen</button>
        <button class="btn primary" id="renameSaveBtn">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Info Panel (Read Mode) -->
  <div class="info-panel-backdrop" id="infoPanelBackdrop">
    <div class="info-panel">
      <div class="info-date" id="infoPanelDate"></div>
      <div class="info-title" id="infoPanelTitle"></div>
      <div class="info-text" id="infoPanelText"></div>
      <div class="info-meta" id="infoPanelMeta"></div>
      <a class="info-link" id="infoPanelLink" href="#" target="_blank" rel="noopener" style="display:none"></a>
      <div class="info-actions">
        <button class="btn primary" id="infoPanelEditBtn">Bearbeiten</button>
        <button class="btn ghost" id="infoPanelCloseBtn">Schlie&szlig;en</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="eventModalBackdrop">
    <div class="modal">
      <h2 id="eventModalTitle">Ereignis</h2>
      <div class="grid">
        <div class="field">
          <label for="eventStart">Startdatum</label>
          <input id="eventStart" type="datetime-local" />
        </div>
        <div class="field">
          <label for="eventEnd">Enddatum (optional)</label>
          <input id="eventEnd" type="datetime-local" />
        </div>

        <div class="field full">
          <label for="eventTitle">Titel</label>
          <input id="eventTitle" type="text" placeholder="Titel des Ereignisses" />
        </div>

        <div class="field full">
          <label for="eventInfo">Infotext</label>
          <textarea id="eventInfo" placeholder="Kurze Beschreibung / Kontext"></textarea>
        </div>

        <div class="field">
          <label for="eventPriority">Priorit&auml;t (1&ndash;10)</label>
          <input id="eventPriority" type="number" min="1" max="10" step="1" />
        </div>

        <div class="field">
          <label for="eventTheme">Thema</label>
          <input id="eventTheme" type="text" placeholder="z. B. Politik" />
        </div>

        <div class="field">
          <label for="eventColor">Farbe</label>

<script>
(() => {
  "use strict";

  /* ── Workspace Storage Keys ── */
  const WORKSPACES_META_KEY = "timeline_app_workspaces_meta_v2";
  const WS_EVENTS_PREFIX = "timeline_app_ws_events_";
  const WS_NOTES_PREFIX = "timeline_app_ws_notes_";
  const TAB_ASSIGNMENTS_KEY = "timeline_app_tab_assignments_v1";

  /* Legacy keys for migration */
  const LEGACY_STORAGE_KEY = "timeline_app_v5_side_zoom";
  const LEGACY_NOTES_KEY = "timeline_app_notes_v1";
  const LEGACY_META_KEY = "timeline_app_workspaces_meta_v1";

  const MS_DAY = 86400000;
  const THEMES_DEFAULT = ["ALLE","Politik","Krieg","Wirtschaft","Medien","Gesellschaft","Technologie","Wissenschaft"];

  const ZOOM_PRESETS = [
    { name:"Tage", daysVisible:7, marker:"day" },
    { name:"Wochen", daysVisible:30, marker:"week" },
    { name:"Monate", daysVisible:120, marker:"month" },
    { name:"Jahre", daysVisible:365 * 3, marker:"year" },
    { name:"Jahrzehnte", daysVisible:365 * 20, marker:"decade" },
    { name:"Jahrhunderte", daysVisible:365 * 200, marker:"century" }
  ];

  const SAMPLE_EVENTS = [
    {
      id: makeId(),
      start: new Date("1914-06-28T12:00:00").toISOString(),
      end: "",
      title: "Attentat von Sarajevo",

    },
    {
      id: makeId(),
      start: new Date("1948-06-20T00:00:00").toISOString(),
      end: "",
      title: "W\u00e4hrungsreform in Westdeutschland",
      info: "Tiefer wirtschaftlicher Einschnitt mit gro\u00dfer gesellschaftlicher Wirkung.",
      priority: 8,
      theme: "Wirtschaft",
      color: "#58d68d",
      source: "",
      link: "",
      tags: ["Deutschland"]
    },
    {
      id: makeId(),
      start: new Date("1989-11-09T18:53:00").toISOString(),
      end: "",
      title: "Fall der Berliner Mauer",
      info: "Symbolischer Wendepunkt der europ\u00e4ischen Nachkriegsgeschichte.",
      priority: 10,
      theme: "Politik",
      color: "#7aa2ff",
